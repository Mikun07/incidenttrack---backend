services:
  postgres:
    image: postgres:16-alpine
    container_name: incidenttrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: incidenttrack
      POSTGRES_PASSWORD: incidenttrack_dev_password
      POSTGRES_DB: incidenttrack
    ports:
      - "5432:5432"
    volumes:
      - incidenttrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidenttrack -d incidenttrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  incidenttrack_postgres_data:

