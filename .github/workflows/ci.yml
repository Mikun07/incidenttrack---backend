name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/incidenttrack?schema=public
      JWT_SECRET: incidenttrack-ci-jwt-secret-with-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
