name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: incidenttrack
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: incidenttrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U incidenttrack -d incidenttrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://incidenttrack:${{ github.run_id }}-${{ github.run_attempt }}@localhost:5432/incidenttrack_test?schema=public
      JWT_SECRET: incidenttrack-ci-jwt-secret-with-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
