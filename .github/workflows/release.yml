name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: incidenttrack
          POSTGRES_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: incidenttrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U incidenttrack -d incidenttrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://incidenttrack:${{ github.run_id }}-${{ github.run_attempt }}@localhost:5432/incidenttrack_test?schema=public
      JWT_SECRET: incidenttrack-ci-jwt-secret-with-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release check
        run: npm run release:check

  package:
    name: Package Docker Image
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            -t "ghcr.io/mikun07/incidenttrack-backend:${GITHUB_REF_NAME}" \
            -t "ghcr.io/mikun07/incidenttrack-backend:latest" \
            .

      - name: Publish Docker image
        run: |
          docker push "ghcr.io/mikun07/incidenttrack-backend:${GITHUB_REF_NAME}"
          docker push "ghcr.io/mikun07/incidenttrack-backend:latest"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
